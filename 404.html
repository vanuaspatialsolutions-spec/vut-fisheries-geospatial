  <title>CBFM Platform</title>
  <script>
    // Redirect all 404s to the root — HashRouter handles all navigation client-side
    var base = window.location.pathname.split('/').slice(0, 2).join('/');
    window.location.replace(window.location.origin + base + '/');
  </script>
</head>
