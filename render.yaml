services:
  # ── Frontend (static site) ────────────────────────────────────────────────
  - type: static
    name: cbfm-frontend
    region: singapore
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_BASE
        value: /
      - key: VITE_API_URL
        # Render service URLs follow this pattern — update if service name changes
        value: https://cbfm-backend.onrender.com/api

  # ── Backend (Node.js API) ─────────────────────────────────────────────────
  - type: web
    name: cbfm-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cbfm-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://vanuaspatialsolutions-spec.github.io

# ── PostgreSQL Database ───────────────────────────────────────────────────
databases:
  - name: cbfm-db
    databaseName: cbfm
    user: cbfm_user
    plan: free
    region: singapore
