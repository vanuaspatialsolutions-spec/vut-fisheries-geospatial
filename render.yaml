services:
  - type: web
    name: cbfm-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/app.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cbfm-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # Set this to your Vercel URL after deployment

databases:
  - name: cbfm-db
    databaseName: cbfm
    user: cbfm_user
    plan: free
    region: singapore
